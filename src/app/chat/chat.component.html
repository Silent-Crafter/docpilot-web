<div class="chat-container d-flex flex-column">
  <div class="d-flex flex-column align-items-center justify-content-center h-100 w-100" *ngIf="messages.length == 0">
    <h1 class="my-1 text-center">Welcome to Samprama DocPilot</h1>
    <p class="my-1 text-secondary text-center">Let your documents do the talking</p>
  </div>
  <div class="messages flex-grow-1 p-3" #messagesContainer>
    <div *ngFor="let message of messages" class="my-3">
      <div class="message" [ngClass]="message.type">
        <div class="d-flex h-100 align-self-start" *ngIf="message.type == 'ai'">
          <div class="pt-1">
            <i class="fas fa-robot"></i>
          </div>
        </div>
        <div class="d-flex h-100">
          <div class="bubble">
            <div
              [innerHTML]="message.type == 'ai' ? renderMarkdown(message.content || '') : message.content"
            ></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="chatbox rounded-5 bg-dark-subtle d-flex align-items-center bg-white px-3 py-2 my-1">
    <textarea
      class="form-control flex-grow-1 my-0 chat-input bg-dark-subtle"
      [(ngModel)]="newInput"
      placeholder="Type a message..."
      (input)="autoGrow($event)"
      (keydown)="handleKeydown($event)"
      rows="1"
    ></textarea>
    <button
      class="btn btn-primary rounded-circle"
      (click)="sendMessage()"
      [disabled]="!this.newInput.trim()"
    >
      <i class="fas fa-paper-plane"></i>
    </button>
  </div>
</div>
